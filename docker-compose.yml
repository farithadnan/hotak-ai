services:

  # ── PostgreSQL (optional — uncomment to use instead of SQLite) ──────────
  # postgres:
  #   image: postgres:16-alpine
  #   container_name: hotak-ai-postgres
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_DB: ${POSTGRES_DB:-hotakai}
  #     POSTGRES_USER: ${POSTGRES_USER:-hotakai}
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hotakai}"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

  # ── Backend (FastAPI + ChromaDB) ─────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hotak-ai-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/app/app/data
      - backend_logs:/app/app/logs
    environment:
      # LLM (required)
      OPENAI_API_KEY: ${OPENAI_API_KEY}

      # Auth (change in production!)
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-secret-in-production}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-10080}

      # Admin bootstrap (first-run only)
      ADMIN_BOOTSTRAP_USERNAME: ${ADMIN_BOOTSTRAP_USERNAME:-admin}
      ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD}
      ADMIN_BOOTSTRAP_EMAIL: ${ADMIN_BOOTSTRAP_EMAIL:-admin@localhost}

      # CORS — allow requests from the frontend container
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}

      # Optional tunables
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-4096}
      STREAM_MAX_CHARS: ${STREAM_MAX_CHARS:-32000}
      ENABLE_SUMMARY_MEMORY: ${ENABLE_SUMMARY_MEMORY:-true}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

      # Ollama (optional — leave blank to disable)
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}

      # Disable LangSmith tracing unless keys are provided
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}

      # Database — defaults to SQLite inside the container.
      # For PostgreSQL: set DATABASE_URL=postgresql://user:pass@postgres:5432/hotakai
      # and uncomment the postgres service + depends_on entry below.
      DATABASE_URL: ${DATABASE_URL:-}

      # Suppress ChromaDB telemetry
      ANONYMIZED_TELEMETRY: "False"

    depends_on:
      - ollama
      # Uncomment when using PostgreSQL:
      # postgres:
      #   condition: service_healthy

  # ── Ollama (local LLM server) ────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: hotak-ai-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Uncomment for NVIDIA GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # ── Frontend (Vite build → nginx) ───────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # The URL the browser uses to reach the backend.
        # For local docker-compose: http://localhost:8000
        # For a remote server: http://your-server-ip:8000
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    container_name: hotak-ai-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  backend_data:
  backend_logs:
  ollama_data:
  # postgres_data:   # uncomment when using PostgreSQL

networks:
  default:
    name: hotak-ai-network
