services:

  # ── Backend (FastAPI + ChromaDB + SQLite) ───────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hotak-ai-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/app/app/data
      - backend_logs:/app/app/logs
    environment:
      # LLM (required)
      OPENAI_API_KEY: ${OPENAI_API_KEY}

      # Auth (change in production!)
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-secret-in-production}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-10080}

      # Admin bootstrap (first-run only)
      ADMIN_BOOTSTRAP_USERNAME: ${ADMIN_BOOTSTRAP_USERNAME:-admin}
      ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD}
      ADMIN_BOOTSTRAP_EMAIL: ${ADMIN_BOOTSTRAP_EMAIL:-admin@localhost}

      # CORS — allow requests from the frontend container
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}

      # Optional tunables
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-4096}
      STREAM_MAX_CHARS: ${STREAM_MAX_CHARS:-32000}
      ENABLE_SUMMARY_MEMORY: ${ENABLE_SUMMARY_MEMORY:-true}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

      # Disable LangSmith tracing unless keys are provided
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}

      # Suppress ChromaDB telemetry
      ANONYMIZED_TELEMETRY: "False"

  # ── Frontend (Vite build → nginx) ───────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # The URL the browser uses to reach the backend.
        # For local docker-compose: http://localhost:8000
        # For a remote server: http://your-server-ip:8000
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    container_name: hotak-ai-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  backend_data:
  backend_logs:
